name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - name: Install frontend dependencies
        run: npm install
      - name: Create release updater config
        shell: bash
        env:
          TAURI_UPDATER_PUBKEY: ${{ vars.TAURI_UPDATER_PUBKEY }}
          TAURI_UPDATER_PUBKEY_SECRET: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          if [ -z "$TAURI_UPDATER_PUBKEY" ] && [ -n "$TAURI_UPDATER_PUBKEY_SECRET" ]; then
            TAURI_UPDATER_PUBKEY="$TAURI_UPDATER_PUBKEY_SECRET"
          fi
          if [ -z "$TAURI_UPDATER_PUBKEY" ]; then
            echo "TAURI_UPDATER_PUBKEY repository variable or secret is required"
            exit 1
          fi
          node -e "const fs=require('fs'); const pubkey=process.env.TAURI_UPDATER_PUBKEY; const endpoints=['https://github.com/JaikenWong/AgentIsOK/releases/latest/download/latest.json']; fs.writeFileSync('src-tauri/tauri.release.conf.json', JSON.stringify({bundle:{createUpdaterArtifacts:true},plugins:{updater:{pubkey,endpoints}}}, null, 2));"
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "AgentIsOK v__VERSION__"
          releaseBody: "See assets for installers."
          releaseDraft: false
          prerelease: false
          args: "--target aarch64-apple-darwin --config src-tauri/tauri.release.conf.json"

  build-windows:
    needs: build-macos
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - name: Install frontend dependencies
        run: npm install
      - name: Create release updater config
        shell: bash
        env:
          TAURI_UPDATER_PUBKEY: ${{ vars.TAURI_UPDATER_PUBKEY }}
          TAURI_UPDATER_PUBKEY_SECRET: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          if [ -z "$TAURI_UPDATER_PUBKEY" ] && [ -n "$TAURI_UPDATER_PUBKEY_SECRET" ]; then
            TAURI_UPDATER_PUBKEY="$TAURI_UPDATER_PUBKEY_SECRET"
          fi
          if [ -z "$TAURI_UPDATER_PUBKEY" ]; then
            echo "TAURI_UPDATER_PUBKEY repository variable or secret is required"
            exit 1
          fi
          node -e "const fs=require('fs'); const pubkey=process.env.TAURI_UPDATER_PUBKEY; const endpoints=['https://github.com/JaikenWong/AgentIsOK/releases/latest/download/latest.json']; fs.writeFileSync('src-tauri/tauri.release.conf.json', JSON.stringify({bundle:{createUpdaterArtifacts:true},plugins:{updater:{pubkey,endpoints}}}, null, 2));"
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "AgentIsOK v__VERSION__"
          releaseBody: "See assets for installers."
          releaseDraft: false
          prerelease: false
          args: "--config src-tauri/tauri.release.conf.json"

  publish-updater-manifest:
    needs: [build-macos, build-windows]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish signed latest.json
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          gh release view "v${VERSION}" --json assets > assets.json
          gh release download "v${VERSION}" -p "*.sig" --clobber
          node scripts/build-updater-manifest.js "${VERSION}" "${GH_REPO}" assets.json
          gh release upload "v${VERSION}" latest.json --clobber

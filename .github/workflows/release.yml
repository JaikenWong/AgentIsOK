name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - name: Install frontend dependencies
        run: npm install
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: "ThatIsOK v__VERSION__"
          releaseBody: "See assets for installers."
          releaseDraft: false
          prerelease: false
          args: "--target aarch64-apple-darwin"
      - name: Generate latest.json (macOS fallback)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if gh release view "v${VERSION}" --json assets --jq '.assets[].name' 2>/dev/null | grep -qx latest.json; then
            echo "latest.json already generated by tauri build, skipping"
            exit 0
          fi
          DMG="ThatIsOK_${VERSION}_aarch64.dmg"
          cat > latest.json << 'JSONEOF'
          {
            "version": "${VERSION}",
            "notes": "Bug fixes and improvements.",
            "pub_date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "platforms": {
              "darwin-aarch64": {
                "url": "https://github.com/JaikenWong/ThatIsOK/releases/download/v${VERSION}/${DMG}"
              }
            }
          }
          JSONEOF
          gh release upload "v${VERSION}" latest.json --clobber

  build-windows:
    needs: build-macos
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - name: Install frontend dependencies
        run: npm install
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: "ThatIsOK v__VERSION__"
          releaseBody: "See assets for installers."
          releaseDraft: false
          prerelease: false
          args: ""
      - name: Merge latest.json (Windows)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          EXE="ThatIsOK_${VERSION}_x64-setup.exe"
          gh release download "v${VERSION}" -p latest.json --clobber 2>/dev/null || true
          if [ -f latest.json ]; then
            cat latest.json | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          d.setdefault('platforms', {})['windows-x86_64'] = {
            'url': 'https://github.com/JaikenWong/ThatIsOK/releases/download/v${VERSION}/${EXE}'
          }
          json.dump(d, sys.stdout, indent=2)
          " > latest_merged.json
            mv latest_merged.json latest.json
          fi
          gh release upload "v${VERSION}" latest.json --clobber

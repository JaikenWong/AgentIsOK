<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThatIsOk</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <div class="eyebrow">ThatIsOk</div>
        <h1>LLM spend board</h1>
      </div>
      <button id="syncButton">Sync</button>
    </header>

    <section class="grid" id="overviewCards"></section>

    <section class="panel">
      <div class="panel-title">Accounts</div>
      <div id="accountsList" class="list"></div>
    </section>

    <section class="panel">
      <div class="panel-title">7d trend</div>
      <div id="trendList" class="list compact"></div>
    </section>

    <section class="panel">
      <div class="panel-title">Recent usage</div>
      <div id="eventsList" class="list compact"></div>
    </section>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
